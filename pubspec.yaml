name: fluttersdk_artisan
description: "Symfony-Console-grade CLI framework for Dart + Flutter. Powers all fluttersdk org CLI dispatchers (artisan binary unifies make:*, dusk:*, telescope:*, tinker, magic_starter, magic_notifications, magic_deeplink command spaces)."
version: 1.0.0-alpha.1
homepage: https://artisan.fluttersdk.com
repository: https://github.com/fluttersdk/artisan
issue_tracker: https://github.com/fluttersdk/artisan/issues

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  args: ^2.7.0
  crypto: ^3.0.0
  meta: ^1.16.0
  path: ^1.9.0
  vm_service: ^15.2.0
  xml: ^6.5.0
  yaml: ^3.1.3
  yaml_edit: ^2.2.3

dev_dependencies:
  coverage: ^1.9.0
  lints: ^5.0.0
  test: ^1.25.0

executables:
  fluttersdk_artisan: fluttersdk_artisan

name: fluttersdk_artisan
description: "Composable Dart CLI framework and stdio MCP server for Flutter. Scaffolding, code generation, transactional plugin installs, hot reload, REPL, and AI agent tooling."
version: 0.0.8
homepage: https://fluttersdk.com/artisan
repository: https://github.com/fluttersdk/artisan
issue_tracker: https://github.com/fluttersdk/artisan/issues
documentation: https://fluttersdk.com/artisan

# pub.dev search topics (max 5, lowercase + hyphens, regex ^[a-z][a-z0-9-]{0,31}$).
# These drive tag-based discovery on https://pub.dev/packages?q=topic%3A<topic>.
topics:
  - cli
  - mcp-server
  - scaffolding
  - plugin-system
  - code-generation

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  args: ^2.7.0
  crypto: ^3.0.0
  dart_mcp: ^0.5.1
  meta: ^1.16.0
  path: ^1.9.0
  stream_channel: ^2.1.0
  vm_service: ^15.2.0
  xml: ^6.5.0
  yaml: ^3.1.3
  yaml_edit: ^2.2.3

dev_dependencies:
  coverage: ^1.9.0
  lints: ^6.0.0
  test: ^1.25.0

executables:
  fluttersdk_artisan: fluttersdk_artisan
  mcp: mcp

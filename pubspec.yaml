name: fluttersdk_artisan
description: "Laravel Artisan-style CLI framework for Dart and Flutter. Plugin scaffolding, declarative install protocol, dev loop (hot reload, hot restart, tinker REPL), and a built-in stdio MCP server (Model Context Protocol) that exposes substrate + plugin tools to Claude / Cursor / Windsurf."
version: 0.0.1
homepage: https://artisan.fluttersdk.com
repository: https://github.com/fluttersdk/artisan
issue_tracker: https://github.com/fluttersdk/artisan/issues
documentation: https://artisan.fluttersdk.com

# pub.dev search topics (max 5, lowercase + hyphens, regex ^[a-z][a-z0-9-]{0,31}$).
# These drive tag-based discovery on https://pub.dev/packages?q=topic%3A<topic>.
topics:
  - cli
  - artisan
  - scaffolding
  - plugin-system
  - code-generation

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  args: ^2.7.0
  crypto: ^3.0.0
  dart_mcp: ^0.5.1
  meta: ^1.16.0
  path: ^1.9.0
  stream_channel: ^2.1.0
  vm_service: ^15.2.0
  xml: ^6.5.0
  yaml: ^3.1.3
  yaml_edit: ^2.2.3

dev_dependencies:
  coverage: ^1.9.0
  lints: ^5.0.0
  test: ^1.25.0

executables:
  fluttersdk_artisan: fluttersdk_artisan
  mcp: mcp

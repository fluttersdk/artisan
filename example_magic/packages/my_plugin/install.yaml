plugin_name: my_plugin

publish:
  install/my_plugin_config.dart: lib/config/my_plugin.dart

magic:
  provider: MyPluginServiceProvider

prompts:
  - key: configPath
    type: string
    default: "~/.my_plugin.conf"
    question: "Configuration path?"

placeholders:
  configFilePath: "{{ prompts.configPath }}"

bootstrap_command: my_plugin:install

name: Feature Request
description: Suggest a new feature or enhancement for fluttersdk_artisan
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for artisan? We'd love to hear it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature or improvement would you like to see?
      placeholder: A clear description of the feature and why it's needed.
    validations:
      required: true

  - type: dropdown
    id: subsystem
    attributes:
      label: Subsystem
      description: Which part of the framework does this relate to?
      options:
        - Console (ArtisanApplication, ArtisanRegistry, signature DSL)
        - Commands (new builtin command)
        - Lifecycle (start / stop / status / logs / restart / reload / hot-restart)
        - Scaffolding (make:plugin / make:command / consumer:scaffold)
        - Plugin Management (plugin:install / plugin:uninstall / plugins:refresh)
        - MCP Server (filter, soft-fail, lazy-reconnect, transport)
        - MCP Tools (new substrate tool, plugin tool surface)
        - install.yaml schema extension
        - PluginInstaller DSL (new operation type)
        - Helpers (new editor for a new file format)
        - State / VM Service
        - Tinker REPL
        - Documentation
        - New Subsystem
        - Other
    validations:
      required: true

  - type: textarea
    id: api-syntax
    attributes:
      label: Proposed API
      description: How would the API look? Show the CLI invocation, install.yaml schema entry, or Dart code shape.
      placeholder: |
        # CLI example
        dart run fluttersdk_artisan plugin:install <name> --transport=http

        # install.yaml example
        proxy:
          target_url: https://api.example.com
          headers:
            Authorization: "Bearer {{ prompts.token }}"
      render: yaml

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe a real scenario where you'd use this feature.
      placeholder: "When publishing a plugin that needs to inject a custom proxy config..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've tried?

  - type: textarea
    id: code
    attributes:
      label: Example Implementation
      description: How would this look in a real plugin or consumer app?
      render: dart
